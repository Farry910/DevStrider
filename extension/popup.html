<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 340px;
      padding: 20px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      font-size: 13px;
      background: #ffffff;
      color: #1f2937;
      letter-spacing: 0.01em;
    }
    h3 {
      margin: 0 0 20px 0;
      font-size: 16px;
      font-weight: 600;
      color: #111827;
      letter-spacing: -0.02em;
    }
    p { line-height: 1.5; }
    code {
      background: #f3f4f6;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div style="display:flex;align-items:baseline;gap:8px;margin:0 0 12px 0;">
    <h3 style="margin:0;">Bid Assistant</h3>
    <span id="version" style="font-size:11px;color:#9ca3af;font-weight:500;"></span>
  </div>
  <p style="margin:0 0 12px 0;font-size:12px;color:#374151;">
    Sends bids and Word-macro triggers to the local DevStrider desktop app at
    <code>http://127.0.0.1:8765</code>.
  </p>
  <p style="margin:0;font-size:12px;color:#6b7280;">
    Configure the Word document path and macro hotkey in DevStrider &middot; Settings.
  </p>
  <script src="popup.js"></script>
</body>
</html>
